<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>For You</title>

<style>

body{
    margin:0;
    background:black;
    overflow:hidden;
    color:white;
    font-family:Georgia, serif;
}


#startScreen{
    position:fixed;
    inset:0;
    background:black;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:1000;
    cursor:pointer;
}


#startScreen h1{
    font-size:3em;
}


#lyrics{
    position:absolute;
    top:50%;
    width:100%;
    text-align:center;
    transform:translateY(-50%);
    font-size:2em;
}


.snowflake{
    position:absolute;
    color:white;
    animation:fall linear infinite;
}


@keyframes fall{

from{
    transform:translateY(-10vh);
}

to{
    transform:translateY(110vh);
}

}


#ending{

    position:fixed;
    inset:0;
    background:black;
    display:none;
    justify-content:center;
    align-items:center;
    text-align:center;
    font-size:2em;
    padding:20px;

}


</style>

</head>


<body>


<div id="startScreen">

<h1>🎄 Merry Christmas</h1>

<p>Click Anywhere</p>

</div>



<!-- MUSIC -->

<video id="bgMusic" style="display:none;" playsinline>

<source src="music.mp4" type="video/mp4">

</video>



<div id="lyrics"></div>



<div id="ending">

i love u, please give me another chance

</div>



<script>



const lyrics = [

["So, what if I call",4000],

["And you pick up the phone?",5000],

["And I use this holiday to make my way to your ghost",9000],

["Oh, what if you're lonely",5000],

["And you know I am too",4000],

["And I get the chance to stay",3000],

["im sorry naziff, I miss you.",5000]

];



let box = document.getElementById("lyrics");



async function showLyrics(){


for(let item of lyrics){

box.innerHTML=item[0];

await new Promise(resolve =>
setTimeout(resolve,item[1])
);

}


box.innerHTML="";


document.getElementById("ending")
.style.display="flex";


}





function createSnow(){


let snow=document.createElement("div");


snow.className="snowflake";


snow.innerHTML="❅";


snow.style.left =
Math.random()*100+"vw";


snow.style.fontSize =
(10+Math.random()*20)+"px";


snow.style.animationDuration =
(4+Math.random()*6)+"s";


document.body.appendChild(snow);



setTimeout(()=>{

snow.remove();

},10000);


}



setInterval(createSnow,120);





document.getElementById("startScreen")
.addEventListener("click",()=>{


let music =
document.getElementById("bgMusic");



music.play();



document.getElementById("startScreen")
.style.display="none";



showLyrics();



},{once:true});





</script>


</body>

</html>
