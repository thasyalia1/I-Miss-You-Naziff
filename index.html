<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>For You</title>

<style>

body{
    margin:0;
    background:black;
    overflow:hidden;
    color:white;
    font-family:Georgia,serif;
}


/* START */

#startScreen{

position:fixed;
inset:0;

background:black;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

z-index:1000;

cursor:pointer;

}


#startScreen h1{
font-size:3em;
}





/* LYRICS */

#lyrics{

position:absolute;

top:50%;

width:100%;

text-align:center;

transform:translateY(-50%);

font-size:2em;

}





/* SNOW */

.snowflake{

position:absolute;
color:white;

animation:fall linear infinite;

}


@keyframes fall{

from{
transform:translateY(-10vh);
}

to{
transform:translateY(110vh);
}

}







/* END */

#ending{

position:fixed;

inset:0;

background:black;

display:none;

justify-content:center;

align-items:center;

z-index:10;

}





#letter{


width:320px;

min-height:220px;

background:#fffaf0;

color:#222;

border-radius:15px;

padding:30px;

box-sizing:border-box;

transform:scale(0);


box-shadow:0 0 30px white;


}



#letter.open{

animation:openLetter 1.5s forwards;

}



#letterText{

font-size:1.4em;

line-height:1.6;

text-align:center;

white-space:pre-line;

}



@keyframes openLetter{


0%{

transform:scale(0) rotateX(90deg);

}


100%{

transform:scale(1);

}


}








/* PHOTOS */

#photoGallery{

display:none;

}



</style>

</head>



<body>



<div id="startScreen">

<h1>❤️ Im Sorry Naziff</h1>

<p>Click Anywhere</p>

</div>





<!-- MUSIC -->

<audio id="bgMusic" loop>

<source src="music.mp4" type="audio/mp4">

</audio>





<div id="lyrics"></div>





<div id="ending">


<div id="letter">

<div id="letterText"></div>

</div>


</div>








<script>



const lyrics=[


["So, what if I call",4200],


["And you pick up the phone?",3300],


["And I use this holiday to make my way to your ghost",7800],


["Oh, what if you're lonely",3000],


["And you know I am too",3000],


["And I get the chance to stay",3800],


["im sorry naziff, I miss you.",5000]


];





let box=document.getElementById("lyrics");






async function showLyrics(){



for(let item of lyrics){



box.innerHTML=item[0];



await new Promise(resolve=>

setTimeout(resolve,item[1])

);


}



box.innerHTML="";


showLetter();


}






function showLetter(){



document.getElementById("ending")
.style.display="flex";



let letter=
document.getElementById("letter");



letter.classList.add("open");



let text=

"No matter what happens,\n\nI am grateful I met you. ❤️";



let target=
document.getElementById("letterText");



let i=0;



let timer=setInterval(()=>{


target.innerHTML += text[i];


i++;



if(i>=text.length){

clearInterval(timer);

}



},80);



}









function createSnow(){



let snow=document.createElement("div");

snow.className="snowflake";

snow.innerHTML="❅";


snow.style.left=
Math.random()*100+"vw";


snow.style.fontSize=
(10+Math.random()*20)+"px";


snow.style.animationDuration=
(4+Math.random()*6)+"s";



document.body.appendChild(snow);



setTimeout(()=>{

snow.remove();

},10000);



}





setInterval(createSnow,120);







document.getElementById("startScreen")

.addEventListener("click",()=>{



let music=document.getElementById("bgMusic");



music.currentTime=0;


music.play();



document.getElementById("startScreen")

.style.display="none";



showLyrics();



},{once:true});




</script>



</body>

</html>
