<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>I'm sorry Naziff ❤️</title>

<style>

body{
    margin:0;
    background:black;
    overflow:hidden;
    color:white;
    font-family:Georgia,serif;
}


/* START */

#startScreen{
    position:fixed;
    inset:0;
    background:black;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:1000;
    cursor:pointer;
    text-align:center;
}


#startScreen h1{
    font-size:3em;
}


#startScreen p{
    opacity:.8;
}


/* LYRICS */

#lyrics{

    position:absolute;
    top:50%;
    width:100%;
    transform:translateY(-50%);
    text-align:center;
    font-size:2em;
}


/* SNOW */

.snowflake{

    position:absolute;
    color:white;
    animation:fall linear infinite;

}


@keyframes fall{

from{
    transform:translateY(-10vh);
}

to{
    transform:translateY(110vh);
}

}



/* END */

#ending{

    position:fixed;
    inset:0;
    background:black;
    display:none;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:20;

}



/* POLAROID */

#photoGallery{

    display:flex;
    gap:25px;

    opacity:0;
    transform:translateY(-30px);

    transition:2s;

}


#photoGallery.show{

    opacity:1;
    transform:translateY(0);

}



.polaroid{

    background:white;
    padding:12px 12px 35px 12px;

    width:180px;

    border-radius:5px;

    box-shadow:
    0 0 20px rgba(255,255,255,.3);

    transform:rotate(-5deg);

}


.polaroid:nth-child(2){

    transform:rotate(5deg);

}


.polaroid:nth-child(3){

    transform:rotate(-3deg);

}



.polaroid img{

    width:180px;
    height:180px;

    object-fit:cover;

}



.caption{

    color:black;
    text-align:center;

    margin-top:12px;

    font-size:18px;

}



/* ENVELOPE AREA */

#envelopeBox{

    margin-top:45px;

    position:relative;

    width:340px;
    height:220px;

}



/* ENVELOPE */

#envelope{


    position:absolute;

    bottom:0;

    width:340px;
    height:190px;

    background:#ffb6c9;

    border-radius:15px;

    box-shadow:
    0 0 25px rgba(255,120,160,.5);


    overflow:hidden;


}



/* flap */

#flap{


    position:absolute;

    top:0;
    left:0;

    width:0;
    height:0;

    border-left:170px solid transparent;
    border-right:170px solid transparent;
    border-top:120px solid #ff8fb0;

    z-index:3;

}



/* letter */

#paper{


    position:absolute;

    left:20px;

    width:300px;

    min-height:220px;

    background:white;

    color:#333;

    padding:25px;

    box-sizing:border-box;

    border-radius:12px;


    bottom:20px;

    transform:translateY(130px);

    transition:2s ease;

    z-index:2;


    box-shadow:
    0 0 20px rgba(0,0,0,.3);

}



#paper.open{

    transform:translateY(-130px);

}



#letterText{

    text-align:center;

    line-height:1.7;

    font-size:1.1em;

    white-space:pre-line;

}



/* heart seal */

#seal{


    position:absolute;

    top:85px;
    left:145px;

    width:50px;
    height:50px;

    background:#ff3366;

    border-radius:50%;

    z-index:5;

    display:flex;

    justify-content:center;
    align-items:center;

    font-size:25px;

}



/* fireworks */


#fireworks{

    position:fixed;

    inset:0;

    pointer-events:none;

    z-index:25;

}


</style>

</head>


<body>


<div id="startScreen">


<h1>❤️ I'm Sorry Naziff</h1>

<p>
Click Anywhere
</p>


</div>



<audio id="bgMusic" loop>

<source src="music.mp4" type="audio/mp4">

</audio>




<div id="lyrics"></div>




<div id="ending">



<div id="photoGallery">


<div class="polaroid">

<img src="photo1.jpg">

<div class="caption">
memory ❤️
</div>

</div>



<div class="polaroid">

<img src="photo2.jpg">

<div class="caption">
us ✨
</div>

</div>



<div class="polaroid">

<img src="photo3.jpg">

<div class="caption">
forever
</div>

</div>


</div>




<div id="envelopeBox">


<div id="envelope">


<div id="flap"></div>


<div id="paper">

<div id="letterText"></div>

</div>


<div id="seal">
❤️
</div>


</div>


</div>


</div>




<canvas id="fireworks"></canvas>




<script>



const lyrics=[


["So, what if I call",4200],

["And you pick up the phone?",4300],

["And I use this holiday to make my way to your ghost",7800],

["Or what if you're lonely",4500],

["And you know I am too",3500],

["And I get the chance to say",6000],

["I'm sorry Naziff, I miss you ❤️",5000]


];



let box=document.getElementById("lyrics");



async function showLyrics(){


await new Promise(r=>setTimeout(r,500));


for(let item of lyrics){


box.innerHTML=item[0];


await new Promise(r=>
setTimeout(r,item[1])
);


}


box.innerHTML="";


showEnding();


}




function showEnding(){


document
.getElementById("ending")
.style.display="flex";



startFireworks();



setTimeout(()=>{


document
.getElementById("photoGallery")
.classList.add("show");


},500);



setTimeout(()=>{


document
.getElementById("paper")
.classList.add("open");


},2500);



setTimeout(()=>{


typeLetter();


},4500);



}





function typeLetter(){



const text=

`I'm sorry Naziff ❤️
Thank you for every memory,
I hope we can be okay again.
Please give me another chance`;



let target=
document.getElementById("letterText");

let i=0;



let timer=setInterval(()=>{


target.innerHTML+=
text.charAt(i);


i++;


if(i>=text.length){

clearInterval(timer);

}


},60);



}





function createSnow(){


let snow=document.createElement("div");


snow.className="snowflake";


snow.innerHTML="❅";


snow.style.left=
Math.random()*100+"vw";


snow.style.fontSize=
(10+Math.random()*20)+"px";


snow.style.animationDuration=
(4+Math.random()*6)+"s";



document.body.appendChild(snow);



setTimeout(()=>{

snow.remove();

},10000);



}



setInterval(createSnow,120);





const canvas=
document.getElementById("fireworks");


const ctx=
canvas.getContext("2d");



canvas.width=
innerWidth;


canvas.height=
innerHeight;



let particles=[];



function heartFirework(){


let x=Math.random()*canvas.width;

let y=Math.random()*canvas.height/2;



for(let i=0;i<80;i++){


let a=Math.PI*2*i/80;


let hx=
16*Math.pow(Math.sin(a),3);



let hy=-(

13*Math.cos(a)

-5*Math.cos(2*a)

-2*Math.cos(3*a)

-Math.cos(4*a)

);



particles.push({

x:x,
y:y,

vx:hx/8,
vy:hy/8,

life:100


});


}


}





function animateFirework(){


ctx.clearRect(
0,0,
canvas.width,
canvas.height
);



particles.forEach((p,index)=>{


p.x+=p.vx;

p.y+=p.vy;


p.life--;


ctx.font="20px serif";

ctx.fillText(
"❤️",
p.x,
p.y
);



if(p.life<=0){

particles.splice(index,1);

}


});



requestAnimationFrame(
animateFirework
);


}



animateFirework();




function startFireworks(){


setInterval(()=>{

heartFirework();

},1500);


}





document
.getElementById("startScreen")
.addEventListener("click",()=>{


let music=
document.getElementById("bgMusic");


music.currentTime=0;

music.play();



document
.getElementById("startScreen")
.style.display="none";



showLyrics();



},{once:true});



</script>



</body>
</html>
