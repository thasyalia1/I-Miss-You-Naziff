<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Im Sorry Naziff ❤️</title>

<style>

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
}

html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    position: fixed;
    top: 0;
    left: 0;
    background: black;
    color: white;
    font-family: Georgia, serif;
    -webkit-user-select: none;
    user-select: none;
    -webkit-text-size-adjust: 100%;
}

/* ===== BACKGROUND STARS ===== */
#stars {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
}

.star {
    position: absolute;
    background: white;
    border-radius: 50%;
    animation: twinkle var(--duration) ease-in-out infinite alternate;
}

@keyframes twinkle {
    0% { opacity: 0.2; transform: scale(0.5); }
    100% { opacity: 1; transform: scale(1.2); }
}

/* ===== SHOOTING STARS ===== */
.shooting-star {
    position: absolute;
    width: 3px;
    height: 3px;
    background: white;
    border-radius: 50%;
    animation: shoot linear infinite;
    box-shadow: 0 0 20px rgba(255,255,255,0.8);
}

.shooting-star::after {
    content: '';
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 100px;
    height: 1px;
    background: linear-gradient(to left, rgba(255,255,255,0.8), transparent);
}

@keyframes shoot {
    0% {
        transform: translate(0, 0) rotate(-45deg);
        opacity: 0;
    }
    10% {
        opacity: 1;
    }
    90% {
        opacity: 1;
    }
    100% {
        transform: translate(-500px, 500px) rotate(-45deg);
        opacity: 0;
    }
}

/* ===== START SCREEN ===== */
#startScreen {
    position: fixed;
    inset: 0;
    background: black;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 1000;
    cursor: pointer;
    touch-action: manipulation;
}

#startScreen h1 {
    font-size: clamp(2em, 6vw, 4em);
    text-shadow: 0 0 30px rgba(255,50,100,0.5), 0 0 60px rgba(255,50,100,0.3);
    animation: glowPulse 2s ease-in-out infinite alternate;
    text-align: center;
    padding: 0 20px;
    pointer-events: none;
    position: relative;
}

#startScreen h1::before {
    content: '💕';
    position: absolute;
    left: -50px;
    animation: floatHeart 3s ease-in-out infinite;
}

#startScreen h1::after {
    content: '💕';
    position: absolute;
    right: -50px;
    animation: floatHeart 3s ease-in-out infinite 1.5s;
}

@keyframes glowPulse {
    0% { text-shadow: 0 0 20px rgba(255,50,100,0.3), 0 0 40px rgba(255,50,100,0.1); }
    100% { text-shadow: 0 0 40px rgba(255,50,100,0.8), 0 0 80px rgba(255,50,100,0.4), 0 0 120px rgba(255,50,100,0.2); }
}

@keyframes floatHeart {
    0%, 100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-20px) scale(1.2); }
}

#startScreen p {
    margin-top: 30px;
    animation: pulse 2s infinite;
    font-size: clamp(1em, 2.5vw, 1.5em);
    color: #ff6f9c;
    pointer-events: none;
    padding: 15px 40px;
    background: rgba(255,100,150,0.1);
    border-radius: 50px;
    border: 1px solid rgba(255,100,150,0.3);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    box-shadow: 0 0 30px rgba(255,100,150,0.1);
    position: relative;
    overflow: hidden;
}

#startScreen p::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: conic-gradient(from 0deg, transparent, rgba(255,100,150,0.1), transparent, rgba(255,100,150,0.1), transparent);
    animation: rotateBorder 4s linear infinite;
}

@keyframes rotateBorder {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

@keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.95); }
}

/* ===== LYRICS ===== */
#lyrics {
    position: absolute;
    top: 50%;
    width: 100%;
    transform: translateY(-50%);
    text-align: center;
    font-size: clamp(1.2em, 3.5vw, 2.5em);
    z-index: 10;
    text-shadow: 0 0 20px rgba(255,100,150,0.5), 0 0 40px rgba(255,100,150,0.2);
    padding: 0 20px;
    pointer-events: none;
    line-height: 1.6;
    background: linear-gradient(45deg, #ff6b9d, #ff2d75, #ff6b9d);
    background-size: 200% 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: gradientMove 3s ease-in-out infinite;
}

@keyframes gradientMove {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
}

/* ===== SNOW ===== */
.snowflake {
    position: absolute;
    color: white;
    animation: fall linear infinite;
    pointer-events: none;
    will-change: transform;
    text-shadow: 0 0 10px rgba(255,255,255,0.5);
}

@keyframes fall {
    0% { transform: translateY(-10vh) rotate(0deg) scale(0.5); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg) scale(1.5); opacity: 0; }
}

/* ===== ENDING ===== */
#ending {
    position: fixed;
    inset: 0;
    background: black;
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 20;
    padding: 20px;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
}

/* ===== PHOTO GALLERY ===== */
#photoGallery {
    display: flex;
    gap: clamp(10px, 3vw, 30px);
    margin-bottom: clamp(20px, 5vh, 50px);
    opacity: 0;
    transition: 2s;
    flex-wrap: wrap;
    justify-content: center;
}

#photoGallery.show {
    opacity: 1;
}

#photoGallery img {
    width: clamp(100px, 20vw, 180px);
    height: clamp(100px, 20vw, 180px);
    object-fit: cover;
    border-radius: 15px;
    border: 2px solid rgba(255,100,150,0.3);
    box-shadow: 0 0 30px rgba(255,100,150,0.1);
    transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    pointer-events: none;
    -webkit-user-drag: none;
}

#photoGallery.show img:nth-child(1) {
    animation: photoPop 0.8s ease-out 0.5s both;
}

#photoGallery.show img:nth-child(2) {
    animation: photoPop 0.8s ease-out 0.8s both;
}

#photoGallery.show img:nth-child(3) {
    animation: photoPop 0.8s ease-out 1.1s both;
}

@keyframes photoPop {
    0% { transform: scale(0) rotate(-20deg); opacity: 0; }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
}

#photoGallery img:hover {
    transform: scale(1.1) rotate(-3deg);
    box-shadow: 0 0 50px rgba(255,100,150,0.4);
}

/* ===== ENVELOPE ===== */
#envelope {
    position: relative;
    width: clamp(280px, 40vw, 400px);
    height: clamp(180px, 25vw, 250px);
    background: linear-gradient(135deg, #ff9fbc, #ff7da8);
    border-radius: 15px;
    overflow: visible;
    box-shadow: 0 10px 40px rgba(255,100,150,0.3), inset 0 1px 0 rgba(255,255,255,0.3);
    animation: envelopeFloat 3s ease-in-out infinite;
}

@keyframes envelopeFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
}

#flap {
    position: absolute;
    top: 0;
    left: 0;
    border-left: clamp(140px, 20vw, 200px) solid transparent;
    border-right: clamp(140px, 20vw, 200px) solid transparent;
    border-top: clamp(100px, 14vw, 150px) solid #ff6f9c;
    z-index: 5;
    transition: all 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    filter: drop-shadow(0 -5px 10px rgba(255,100,150,0.2));
}

#paper {
    position: absolute;
    left: clamp(10px, 1.5vw, 20px);
    bottom: clamp(15px, 2vw, 25px);
    width: calc(100% - clamp(20px, 3vw, 40px));
    min-height: clamp(180px, 25vw, 280px);
    background: linear-gradient(135deg, #ffffff, #fff5f7);
    color: black;
    padding: clamp(15px, 2.5vw, 30px);
    border-radius: 12px;
    transform: translateY(80px) scale(0.9);
    opacity: 0;
    transition: all 1.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    z-index: 10;
    box-shadow: 0 10px 40px rgba(0,0,0,0.3);
}

#paper.open {
    transform: translateY(clamp(-120px, -18vw, -200px)) scale(1);
    opacity: 1;
}

#letterText {
    text-align: center;
    line-height: 1.8;
    white-space: pre-line;
    font-size: clamp(12px, 1.5vw, 16px);
    color: #333;
}

#letterText::before {
    content: '💌';
    display: block;
    font-size: 30px;
    margin-bottom: 10px;
}

#seal {
    position: absolute;
    top: clamp(70px, 10vw, 100px);
    left: 50%;
    transform: translateX(-50%);
    width: clamp(40px, 5vw, 60px);
    height: clamp(40px, 5vw, 60px);
    background: radial-gradient(circle at 30% 30%, #ff6b9d, #ff2d75);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 20;
    font-size: clamp(18px, 2.5vw, 28px);
    box-shadow: 0 0 30px rgba(255,51,102,0.5), inset 0 -2px 5px rgba(0,0,0,0.2);
    animation: sealPulse 2s infinite;
    pointer-events: none;
    border: 2px solid rgba(255,255,255,0.3);
}

@keyframes sealPulse {
    0%, 100% { transform: translateX(-50%) scale(1); box-shadow: 0 0 30px rgba(255,51,102,0.5); }
    50% { transform: translateX(-50%) scale(1.1); box-shadow: 0 0 60px rgba(255,51,102,0.8), 0 0 90px rgba(255,51,102,0.4); }
}

/* ===== FIREWORKS ===== */
#fireworks {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 30;
}

/* ===== NEON HEART ===== */
#neonHeart {
    position: fixed;
    inset: 0;
    background: black;
    display: none;
    z-index: 100;
}

#heartCanvas {
    width: 100%;
    height: 100%;
    display: block;
}

/* ===== FLOATING HEARTS ===== */
.floating-heart {
    position: fixed;
    pointer-events: none;
    z-index: 40;
    font-size: 30px;
    animation: floatUp linear forwards;
    opacity: 0;
}

@keyframes floatUp {
    0% {
        opacity: 0;
        transform: translateY(100vh) scale(0) rotate(0deg);
    }
    20% {
        opacity: 1;
    }
    100% {
        opacity: 0;
        transform: translateY(-10vh) scale(1.5) rotate(720deg);
    }
}

/* ===== RESPONSIVE ===== */
@media (max-width: 1024px) and (orientation: portrait) {
    #lyrics { font-size: 1.8em; }
    #photoGallery img { width: 150px; height: 150px; }
}

@media (max-width: 768px) {
    #lyrics { font-size: 1.2em; }
    #photoGallery img { width: 120px; height: 120px; }
}

@media (max-width: 480px) {
    #lyrics { font-size: 1em; }
    #photoGallery img { width: 100px; height: 100px; }
    #envelope { width: 260px; height: 170px; }
}

</style>

</head>

<body>

<!-- ===== STARS BACKGROUND ===== -->
<div id="stars"></div>

<!-- ===== START SCREEN ===== -->
<div id="startScreen">
    <h1>❤️ Im Sorry Naziff</h1>
    <p>👆 Tap to Start</p>
</div>

<!-- ===== AUDIO ===== -->
<audio id="bgMusic" loop preload="auto" playsinline webkit-playsinline>
    <source src="music.m4a" type="audio/mp4">
    <source src="music.mp3" type="audio/mpeg">
    <source src="music.mp4" type="audio/mp4">
</audio>

<!-- ===== LYRICS ===== -->
<div id="lyrics"></div>

<!-- ===== ENDING ===== -->
<div id="ending">
    <div id="photoGallery">
        <img src="photo1.jpg" alt="Memory 1" draggable="false">
        <img src="photo2.jpg" alt="Memory 2" draggable="false">
        <img src="photo3.jpg" alt="Memory 3" draggable="false">
    </div>

    <div id="envelope">
        <div id="paper">
            <div id="letterText"></div>
        </div>
        <div id="flap"></div>
        <div id="seal">❤️</div>
    </div>
</div>

<!-- ===== FIREWORKS ===== -->
<canvas id="fireworks"></canvas>

<!-- ===== NEON HEART ===== -->
<div id="neonHeart">
    <canvas id="heartCanvas"></canvas>
</div>

<script>
// ============================================
// STARS BACKGROUND
// ============================================
function createStars() {
    const container = document.getElementById('stars');
    for (let i = 0; i < 150; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        const size = Math.random() * 3 + 1;
        star.style.width = size + 'px';
        star.style.height = size + 'px';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.setProperty('--duration', (2 + Math.random() * 3) + 's');
        star.style.animationDelay = Math.random() * 3 + 's';
        container.appendChild(star);
    }
}
createStars();

// ============================================
// SHOOTING STARS
// ============================================
function createShootingStar() {
    const star = document.createElement('div');
    star.className = 'shooting-star';
    star.style.left = Math.random() * 80 + '%';
    star.style.top = Math.random() * 30 + '%';
    star.style.animationDuration = (2 + Math.random() * 2) + 's';
    star.style.animationDelay = Math.random() * 5 + 's';
    document.body.appendChild(star);
    setTimeout(() => star.remove(), 4000);
}

setInterval(createShootingStar, 3000);

// ============================================
// FLOATING HEARTS
// ============================================
function createFloatingHeart() {
    const heart = document.createElement('div');
    heart.className = 'floating-heart';
    heart.innerHTML = ['❤️', '💕', '💗', '💖', '💝'][Math.floor(Math.random() * 5)];
    heart.style.left = Math.random() * 100 + '%';
    heart.style.fontSize = (20 + Math.random() * 30) + 'px';
    heart.style.animationDuration = (8 + Math.random() * 6) + 's';
    heart.style.animationDelay = Math.random() * 2 + 's';
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 14000);
}

setInterval(createFloatingHeart, 500);

// ============================================
// UNIVERSAL COMPATIBILITY
// ============================================
document.addEventListener('DOMContentLoaded', function() {
    document.body.style.height = window.innerHeight + 'px';
    document.body.addEventListener('touchmove', function(e) {
        if (e.target === document.body) {
            e.preventDefault();
        }
    }, { passive: false });
});

window.addEventListener('orientationchange', function() {
    setTimeout(function() {
        document.body.style.height = window.innerHeight + 'px';
        if (canvas) {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        if (hCanvas) {
            hCanvas.width = window.innerWidth;
            hCanvas.height = window.innerHeight;
        }
    }, 300);
});

// ============================================
// LYRICS
// ============================================
const lyrics = [
    {text: "So, what if I call", time: 0},
    {text: "And you pick up the phone?", time: 4.2},
    {text: "And I use this holiday to make my way to your ghost", time: 8.5},
    {text: "Or what if you're lonely", time: 16},
    {text: "And you know I am too", time: 21},
    {text: "And I get the chance to say", time: 25},
    {text: "im sorry naziff, I miss you ❤️", time: 31}
];

let box = document.getElementById("lyrics");
let current = -1;
let lastTime = 0;
let endingShown = false;
let letterStarted = false;
let syncId = null;
let snowInterval = null;
let musicStarted = false;
let fireworksInterval = null;
let floatHeartInterval = null;

// ============================================
// MAIN FUNCTIONS
// ============================================
function showLyrics() {
    let music = document.getElementById("bgMusic");
    
    function sync() {
        let now = music.currentTime;
        
        for (let i = 0; i < lyrics.length; i++) {
            if (now >= lyrics[i].time && now < (lyrics[i+1]?.time || 999)) {
                if (current !== i) {
                    box.innerHTML = lyrics[i].text;
                    current = i;
                    if (i === lyrics.length - 1) {
                        lastTime = now;
                    }
                }
            }
        }
        
        if (current === lyrics.length - 1 && now >= lastTime + 10 && !endingShown) {
            box.innerHTML = "";
            showEnding();
        }
        
        syncId = requestAnimationFrame(sync);
    }
    
    sync();
}

function showEnding() {
    if (endingShown) return;
    endingShown = true;
    
    document.getElementById("ending").style.display = "flex";
    startFireworks();
    
    setTimeout(() => {
        document.getElementById("photoGallery").classList.add("show");
    }, 500);
    
    setTimeout(() => {
        document.getElementById("paper").classList.add("open");
    }, 8500);
    
    setTimeout(() => {
        typeLetter();
    }, 11000);
}

function typeLetter() {
    if (letterStarted) return;
    letterStarted = true;
    
    const text = `I'm sorry Naziff ❤️\nThank you for every memory, sayang.\nPlease give me another chance.\nI hope we can be okay again ❤️`;
    let target = document.getElementById("letterText");
    let i = 0;
    
    let timer = setInterval(() => {
        target.innerHTML += text.charAt(i);
        i++;
        if (i >= text.length) {
            clearInterval(timer);
            setTimeout(() => {
                startNeonHeart();
            }, 8000);
        }
    }, 60);
}

// ============================================
// SNOW
// ============================================
function createSnow() {
    let snow = document.createElement("div");
    snow.className = "snowflake";
    const emojis = ['❅', '❆', '✦', '♥'];
    snow.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];
    snow.style.left = Math.random() * 100 + "vw";
    snow.style.fontSize = (10 + Math.random() * 25) + "px";
    snow.style.animationDuration = (4 + Math.random() * 8) + "s";
    snow.style.opacity = 0.3 + Math.random() * 0.7;
    snow.style.color = ['white', '#ffb3d9', '#ff80bf', '#ff4da6'][Math.floor(Math.random() * 4)];
    
    document.body.appendChild(snow);
    
    setTimeout(() => {
        snow.remove();
    }, 12000);
}

snowInterval = setInterval(createSnow, 100);

// ============================================
// FIREWORKS
// ============================================
const canvas = document.getElementById("fireworks");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

function heartFirework() {
    const colors = ['#ff2d75', '#ff6b9d', '#ff4da6', '#ff80bf', '#ffb3d9', '#ff1a5e'];
    let x = Math.random() * canvas.width;
    let y = Math.random() * canvas.height / 2;
    let color = colors[Math.floor(Math.random() * colors.length)];
    
    for (let i = 0; i < 120; i++) {
        let angle = Math.PI * 2 * i / 120;
        let hx = 16 * Math.pow(Math.sin(angle), 3);
        let hy = -(13 * Math.cos(angle) - 5 * Math.cos(2 * angle) - 2 * Math.cos(3 * angle) - Math.cos(4 * angle));
        
        particles.push({
            x: x,
            y: y,
            vx: hx / 6 + (Math.random() - 0.5) * 0.5,
            vy: hy / 6 + (Math.random() - 0.5) * 0.5,
            life: 120 + Math.random() * 40,
            color: color,
            size: 15 + Math.random() * 15
        });
    }
}

function animateFirework() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    particles.forEach((p, index) => {
        p.x += p.vx;
        p.y += p.vy;
        p.vx *= 0.99;
        p.vy *= 0.99;
        p.life--;
        
        ctx.font = p.size + "px serif";
        ctx.textAlign = "center";
        ctx.shadowColor = p.color;
        ctx.shadowBlur = 30;
        ctx.fillStyle = p.color;
        ctx.fillText("❤️", p.x, p.y);
        ctx.shadowBlur = 0;
        
        if (p.life <= 0) {
            particles.splice(index, 1);
        }
    });
    
    requestAnimationFrame(animateFirework);
}

animateFirework();

function startFireworks() {
    if (fireworksInterval) clearInterval(fireworksInterval);
    heartFirework();
    heartFirework();
    fireworksInterval = setInterval(() => {
        heartFirework();
        setTimeout(() => heartFirework(), 300);
    }, 2000);
}

// ============================================
// NEON HEART
// ============================================
const hCanvas = document.getElementById("heartCanvas");
const hctx = hCanvas.getContext("2d");

function resizeHeart() {
    hCanvas.width = window.innerWidth;
    hCanvas.height = window.innerHeight;
}

resizeHeart();
window.addEventListener("resize", resizeHeart);

let points = [];
let ttt = 0;

function makeHeart() {
    points = [];
    for (let i = 0; i < 200; i++) {
        let t = Math.PI * 2 * i / 200;
        let x = 16 * Math.pow(Math.sin(t), 3);
        let y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
        
        points.push({
            x: x * 20,
            y: y * 20,
            phase: Math.random() * 10,
            size: 18 + Math.random() * 15
        });
    }
}

function neonDraw() {
    hctx.clearRect(0, 0, hCanvas.width, hCanvas.height);
    ttt += 0.02;
    
    let cx = hCanvas.width / 2;
    let cy = hCanvas.height / 2;
    
    // Glow background
    let gradient = hctx.createRadialGradient(cx, cy, 0, cx, cy, 300);
    gradient.addColorStop(0, 'rgba(255,50,100,0.05)');
    gradient.addColorStop(1, 'rgba(255,50,100,0)');
    hctx.fillStyle = gradient;
    hctx.fillRect(0, 0, hCanvas.width, hCanvas.height);
    
    points.forEach((p, i) => {
        let pulse = Math.sin(ttt + p.phase) * 8;
        let scale = 1 + Math.sin(ttt * 0.5 + i * 0.1) * 0.1;
        
        hctx.save();
        hctx.translate(cx + p.x * scale + pulse, cy + p.y * scale + pulse);
        hctx.font = `bold ${p.size}px Arial`;
        hctx.textAlign = "center";
        hctx.textBaseline = "middle";
        
        // Outer glow
        hctx.shadowColor = "#ff4fa3";
        hctx.shadowBlur = 50;
        hctx.fillStyle = "#ff7ed0";
        hctx.fillText("❤️", 0, 0);
        
        // Inner glow
        hctx.shadowBlur = 0;
        hctx.fillStyle = "white";
        hctx.fillText("❤️", 0, 0);
        
        hctx.restore();
    });
    
    // Add text in center
    hctx.save();
    hctx.shadowColor = "#ff4fa3";
    hctx.shadowBlur = 40;
    hctx.font = `bold ${Math.min(30, hCanvas.width / 20)}px Arial`;
    hctx.textAlign = "center";
    hctx.textBaseline = "middle";
    hctx.fillStyle = "#ff7ed0";
    hctx.fillText("I love u Naziff", cx, cy + 250 + Math.sin(ttt) * 10);
    hctx.restore();
    
    requestAnimationFrame(neonDraw);
}

function startNeonHeart() {
    document.getElementById("neonHeart").style.display = "block";
    makeHeart();
    neonDraw();
}

// ============================================
// START APP
// ============================================
function startApp(e) {
    if (e) e.preventDefault();
    if (musicStarted) return;
    musicStarted = true;
    
    let music = document.getElementById("bgMusic");
    
    let playPromise = music.play();
    if (playPromise !== undefined) {
        playPromise.then(() => {
            console.log("Audio playing");
        }).catch((err) => {
            console.log("Audio play failed:", err);
            document.addEventListener('touchstart', function retry() {
                music.play().catch(() => {});
                document.removeEventListener('touchstart', retry);
            }, {once: true});
        });
    }
    
    document.getElementById("startScreen").style.display = "none";
    showLyrics();
}

// Event listeners
document.getElementById("startScreen").addEventListener("click", startApp, {once: true});
document.getElementById("startScreen").addEventListener("touchstart", function(e) {
    e.preventDefault();
    startApp(e);
}, {once: true, passive: false});

document.addEventListener('touchstart', function firstTouch(e) {
    if (!musicStarted && document.getElementById("startScreen").style.display !== "none") {
        startApp(e);
    }
    document.removeEventListener('touchstart', firstTouch);
}, {once: true, passive: false});

document.addEventListener('keydown', function(e) {
    if ((e.key === ' ' || e.key === 'Enter') && !musicStarted) {
        e.preventDefault();
        startApp(e);
    }
}, {once: true});

// ============================================
// RESIZE
// ============================================
window.addEventListener('resize', function() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    resizeHeart();
    document.body.style.height = window.innerHeight + 'px';
});

// ============================================
// CLEANUP
// ============================================
window.addEventListener('beforeunload', function() {
    if (syncId) cancelAnimationFrame(syncId);
    if (snowInterval) clearInterval(snowInterval);
    if (fireworksInterval) clearInterval(fireworksInterval);
    if (floatHeartInterval) clearInterval(floatHeartInterval);
});

console.log("❤️ Ultimate version loaded - Compatible with iPhone, iPad, and Mac ❤️");
</script>
