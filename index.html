<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>I'm Sorry Naziff ❤️</title>

<style>

body{
margin:0;
background:black;
overflow:hidden;
color:white;
font-family:Georgia,serif;
}


/* START */

#startScreen{
position:fixed;
inset:0;
background:black;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

z-index:1000;
cursor:pointer;
text-align:center;
}


#startScreen h1{
font-size:3em;
}


/* LYRICS */

#lyrics{

position:absolute;
top:50%;
width:100%;

transform:translateY(-50%);

text-align:center;

font-size:2em;

}



/* SNOW */

.snowflake{

position:absolute;
color:white;

animation:fall linear infinite;

}


@keyframes fall{

from{
transform:translateY(-10vh);
}

to{
transform:translateY(110vh);
}

}



/* END */

#ending{

position:fixed;

inset:0;

background:black;

display:none;

flex-direction:column;

justify-content:center;

align-items:center;

z-index:20;

}



/* PHOTO */


#photoGallery{

display:flex;

gap:25px;

opacity:0;

transition:2s;

}



#photoGallery.show{

opacity:1;

}



.polaroid{

background:white;

padding:12px 12px 35px;

width:170px;

border-radius:8px;

box-shadow:0 0 25px rgba(255,255,255,.4);

}



.polaroid img{

width:170px;

height:170px;

object-fit:cover;

}


.caption{

color:black;

text-align:center;

margin-top:10px;

}




/* ENVELOPE */


#envelopeBox{

margin-top:60px;

width:330px;

height:230px;

position:relative;

}





#envelope{

position:absolute;

bottom:0;

width:330px;

height:190px;

background:#ff9fbc;

border-radius:15px;

box-shadow:0 0 30px rgba(255,120,160,.6);

}





/* LETTER */


#paper{

position:absolute;

left:15px;

bottom:20px;

width:300px;

min-height:230px;


background:#fffdf5;

color:#333;


padding:25px;

box-sizing:border-box;


border-radius:15px;


transform:translateY(0);

transition:2s ease;


z-index:5;


box-shadow:0 0 20px rgba(0,0,0,.4);


}



#paper.open{

transform:translateY(-170px);

}



#letterText{

text-align:center;

line-height:1.7;

font-size:1.05em;

white-space:pre-line;

}




#flap{

position:absolute;

top:0;

left:0;

width:0;

height:0;


border-left:165px solid transparent;

border-right:165px solid transparent;

border-top:120px solid #ff6f9c;


z-index:10;

}



#seal{

position:absolute;

top:75px;

left:140px;

width:50px;

height:50px;


background:#ff3366;


border-radius:50%;


display:flex;

justify-content:center;

align-items:center;


font-size:25px;


z-index:20;


}




#fireworks{

position:fixed;

inset:0;

pointer-events:none;

z-index:50;

}


</style>

</head>


<body>



<div id="startScreen">

<h1>❤️ I'm Sorry Naziff</h1>

<p>Click Anywhere</p>

</div>





<audio id="bgMusic" loop>

<source src="music.mp4" type="audio/mp4">

</audio>






<div id="lyrics"></div>






<div id="ending">





<div id="photoGallery">



<div class="polaroid">

<img src="photo1.jpg">

<div class="caption">
I
</div>

</div>



<div class="polaroid">

<img src="photo2.jpg">

<div class="caption">
Love
</div>

</div>




<div class="polaroid">

<img src="photo3.jpg">

<div class="caption">
You
</div>

</div>


</div>







<div id="envelopeBox">


<div id="envelope">



<div id="paper">


<div id="letterText"></div>


</div>



<div id="flap"></div>


<div id="seal">
❤️
</div>



</div>

</div>





</div>






<canvas id="fireworks"></canvas>







<script>





/* LYRICS SYNC */


const lyrics=[


{
text:"So, what if I call",
time:0
},


{
text:"And you pick up the phone?",
time:4.2
},


{
text:"And I use this holiday to make my way to your ghost",
time:8.5
},


{
text:"Or what if you're lonely",
time:16
},


{
text:"And you know I am too",
time:21
},


{
text:"And I get the chance to say",
time:25
},


{
text:"I'm sorry Naziff, I miss you ❤️",
time:31
}


];





let lyricBox =
document.getElementById("lyrics");


let currentLine=-1;





function syncLyrics(){


let song =
document.getElementById("bgMusic");


let now=song.currentTime;



for(let i=0;i<lyrics.length;i++){


if(
now>=lyrics[i].time &&
now<(lyrics[i+1]?.time || 999)

){



if(currentLine!==i){


lyricBox.innerHTML =
lyrics[i].text;


currentLine=i;


}


}



}


requestAnimationFrame(syncLyrics);


}








/* ENDING */


function showEnding(){


document
.getElementById("ending")
.style.display="flex";



startFireworks();




setTimeout(()=>{


document
.getElementById("photoGallery")
.classList.add("show");


},500);





/* LETTER AFTER 10 SEC */


setTimeout(()=>{


document
.getElementById("paper")
.classList.add("open");


},10000);





/* TYPE AFTER OPEN */


setTimeout(()=>{


typeLetter();


},12000);



}









function typeLetter(){


const text =

`I'm sorry Naziff ❤️
Thank you for every moment.
Please give me another chance.
I hope we can be okay again ❤️`;



let target =
document.getElementById("letterText");


let i=0;



let timer=setInterval(()=>{


target.innerHTML +=
text.charAt(i);



i++;



if(i>=text.length){

clearInterval(timer);

}



},60);



}









/* SNOW */


function createSnow(){


let snow=document.createElement("div");


snow.className="snowflake";


snow.innerHTML="❅";



snow.style.left =
Math.random()*100+"vw";



snow.style.fontSize =
(10+Math.random()*20)+"px";



snow.style.animationDuration =
(4+Math.random()*6)+"s";



document.body.appendChild(snow);



setTimeout(()=>{


snow.remove();


},10000);


}



setInterval(createSnow,120);









/* FIREWORK */


const canvas =
document.getElementById("fireworks");


const ctx =
canvas.getContext("2d");



canvas.width=innerWidth;

canvas.height=innerHeight;



let particles=[];





function heartFirework(){


let x=Math.random()*canvas.width;

let y=Math.random()*canvas.height/2;



for(let i=0;i<80;i++){



let a=Math.PI*2*i/80;



let hx =
16*Math.pow(Math.sin(a),3);



let hy=-(

13*Math.cos(a)

-5*Math.cos(2*a)

-2*Math.cos(3*a)

-Math.cos(4*a)

);




particles.push({

x:x,

y:y,

vx:hx/8,

vy:hy/8,

life:100

});


}



}






function animateFirework(){


ctx.clearRect(
0,0,
canvas.width,
canvas.height
);



particles.forEach((p,index)=>{


p.x+=p.vx;

p.y+=p.vy;


p.life--;



ctx.font="20px serif";


ctx.fillText(
"❤️",
p.x,
p.y
);



if(p.life<=0){

particles.splice(index,1);

}



});



requestAnimationFrame(
animateFirework
);



}



animateFirework();






function startFireworks(){


setInterval(()=>{


heartFirework();


},1500);



}









/* START */


document
.getElementById("startScreen")
.addEventListener("click",()=>{


let music =
document.getElementById("bgMusic");



music.currentTime=0;


music.play();



document
.getElementById("startScreen")
.style.display="none";



syncLyrics();


showEnding();



},{once:true});





</script>



</body>

</html>
