<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>For You</title>

<style>

body{
    margin:0;
    background:black;
    overflow:hidden;
    color:white;
    font-family:Georgia, serif;
}



/* START SCREEN */

#startScreen{

    position:fixed;
    inset:0;
    background:black;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    z-index:1000;
    cursor:pointer;

}


#startScreen h1{
    font-size:3em;
}





/* LYRICS */

#lyrics{

    position:absolute;
    top:50%;
    width:100%;

    text-align:center;

    transform:translateY(-50%);

    font-size:2em;

    padding:20px;

}







/* SNOW */

.snowflake{

    position:absolute;

    color:white;

    animation:fall linear infinite;

}



@keyframes fall{


from{

transform:translateY(-10vh);

}


to{

transform:translateY(110vh);

}


}








/* ENDING */

#ending{

    position:fixed;

    inset:0;

    background:black;

    display:none;

    flex-direction:column;

    justify-content:center;

    align-items:center;

    text-align:center;

    padding:20px;

    z-index:2;

}





#photoGallery{

    display:flex;

    justify-content:center;

    flex-wrap:wrap;

    gap:15px;

    margin-bottom:25px;

}





#photoGallery img{


    width:180px;

    height:180px;


    object-fit:cover;


    border-radius:20px;


    animation:fade 2s;

}





#endingText{

    font-size:1.8em;

    animation:fade 2s;

}





@keyframes fade{


from{

opacity:0;

}


to{

opacity:1;

}


}






/* FIREWORK */

#fireworks{

    position:fixed;

    inset:0;

    pointer-events:none;

    z-index:5;

}



</style>


</head>




<body>





<div id="startScreen">


<h1>❤️ Im Sorry Naziff</h1>


<p>Click Anywhere</p>


</div>








<!-- MUSIC -->


<video id="bgMusic" style="display:none;" playsinline>


<source src="music.mp4" type="video/mp4">


</video>







<div id="lyrics"></div>








<!-- END -->


<div id="ending">



<div id="photoGallery">


<img src="photo1.jpg">

<img src="photo2.jpg">

<img src="photo3.jpg">


</div>




<div id="endingText">


i love u, please give me another chance ❤️


</div>



</div>






<canvas id="fireworks"></canvas>








<script>





const lyrics=[


["So, what if I call",4200],


["And you pick up the phone?",3300],


["And I use this holiday to make my way to your ghost",7800],


["Oh, what if you're lonely",3000],


["And you know I am too",3000],


["And I get the chance to stay",3800],


["im sorry naziff, I miss you.",5000]


];






let box=document.getElementById("lyrics");







async function showLyrics(){


await new Promise(resolve=>setTimeout(resolve,500));



for(let item of lyrics){


box.innerHTML=item[0];


await new Promise(resolve=>

setTimeout(resolve,item[1])

);


}



box.innerHTML="";



document.getElementById("ending")

.style.display="flex";



startFireworks();


}









/* SNOW */

function createSnow(){


let snow=document.createElement("div");


snow.className="snowflake";


snow.innerHTML="❅";



snow.style.left=

Math.random()*100+"vw";



snow.style.fontSize=

(10+Math.random()*20)+"px";



snow.style.animationDuration=

(4+Math.random()*6)+"s";



document.body.appendChild(snow);




setTimeout(()=>{

snow.remove();

},10000);


}



setInterval(createSnow,120);








/* HEART FIREWORK */



const canvas=document.getElementById("fireworks");

const ctx=canvas.getContext("2d");


canvas.width=window.innerWidth;

canvas.height=window.innerHeight;



let particles=[];



function heartFirework(){



let x=Math.random()*canvas.width;

let y=Math.random()*canvas.height/2;



for(let i=0;i<80;i++){



let angle=Math.PI*2*i/80;



let hx=16*Math.pow(Math.sin(angle),3);


let hy=-(

13*Math.cos(angle)

-5*Math.cos(2*angle)

-2*Math.cos(3*angle)

-Math.cos(4*angle)

);





particles.push({


x:x,

y:y,


vx:hx/8,

vy:hy/8,


life:100


});



}



}






function animateFirework(){


ctx.clearRect(0,0,canvas.width,canvas.height);



particles.forEach((p,index)=>{


p.x+=p.vx;

p.y+=p.vy;


p.life--;



ctx.font="20px serif";

ctx.fillText("❤️",p.x,p.y);




if(p.life<=0){


particles.splice(index,1);


}


});




requestAnimationFrame(animateFirework);


}


animateFirework();





function startFireworks(){


setInterval(()=>{


heartFirework();


},1500);


}









/* CLICK START */



document.getElementById("startScreen")

.addEventListener("click",()=>{


let music=document.getElementById("bgMusic");



music.currentTime=0;


music.play();



document.getElementById("startScreen")

.style.display="none";



showLyrics();



},{once:true});




</script>





</body>


</html>
