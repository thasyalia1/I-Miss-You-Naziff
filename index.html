<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>For You</title>

<style>

body{
    margin:0;
    background:black;
    overflow:hidden;
    color:white;
    font-family:Georgia, serif;
}


/* START */

#startScreen{
    position:fixed;
    inset:0;
    background:black;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:1000;
    cursor:pointer;
}


#startScreen h1{
    font-size:3em;
}


#startScreen p{
    opacity:0.8;
}



/* LYRICS */

#lyrics{
    position:absolute;
    top:50%;
    width:100%;
    text-align:center;
    transform:translateY(-50%);
    font-size:2em;
    padding:20px;
    box-sizing:border-box;
}



/* SNOW */

.snowflake{
    position:absolute;
    color:white;
    animation:fall linear infinite;
}



@keyframes fall{
from{
    transform:translateY(-10vh);
}
to{
    transform:translateY(110vh);
}
}




/* ENDING */

#ending{
    position:fixed;
    inset:0;
    background:black;
    display:none;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
    box-sizing:border-box;
}



#photoGallery{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:15px;
    margin-bottom:30px;
}



#photoGallery img{
    width:180px;
    height:180px;
    object-fit:cover;
    border-radius:20px;
    animation:fade 2s;
}




#endingText{
    font-size:1.8em;
    animation:fade 2s;
}





@keyframes fade{
from{
    opacity:0;
}
to{
    opacity:1;
}
}



</style>

</head>


<body>



<div id="startScreen">

<h1>❤️ Im Sorry Naziff</h1>

<p>Click Anywhere</p>

</div>





<!-- MUSIC -->
<video id="bgMusic" style="display:none;" playsinline>
<source src="music.mpeg" type="audio/mpeg">
</video>





<div id="lyrics"></div>






<!-- ENDING -->

<div id="ending">


<div id="photoGallery">

<img src="photo1.jpg">

<img src="photo2.jpg">

<img src="photo3.jpg">

</div>



<div id="endingText">

i love u, please give me another chance ❤️

</div>


</div>






<script>

// Masa di bawah telah diselaraskan dengan tepat mengikut saat fail audio "music.mpeg" anda
const lyricsTimeline = [
    { text: "So, what if I call", time: 0.5 },
    { text: "And you pick up the phone?", time: 4.0 },
    { text: "And I use this holiday to make my way to your ghost", time: 8.5 },
    { text: "Oh, what if you're lonely", time: 18.0 },
    { text: "And you know I am too", time: 21.5 },
    { text: "And I get the chance to stay", time: 25.0 },
    { text: "im sorry naziff, I miss you.", time: 30.5 },
    { text: "ENDING_SCREEN", time: 38.0 } // Papar gambar & ucapan maaf pada saat ke-38
];

let box = document.getElementById("lyrics");
let music = document.getElementById("bgMusic");
let currentLine = 0;

function updateLyrics() {
    if (currentLine >= lyricsTimeline.length) return;

    let currentTrackTime = music.currentTime;
    let nextTarget = lyricsTimeline[currentLine];

    if (currentTrackTime >= nextTarget.time) {
        if (nextTarget.text === "ENDING_SCREEN") {
            box.innerHTML = "";
            document.getElementById("ending").style.display = "flex";
            music.removeEventListener("timeupdate", updateLyrics); 
        } else {
            box.innerHTML = nextTarget.text;
        }
        currentLine++;
    }
    
    if (currentLine < lyricsTimeline.length) {
        requestAnimationFrame(updateLyrics);
    }
}

function createSnow(){
    let snow = document.createElement("div");
    snow.className = "snowflake";
    snow.innerHTML = "❅";
    snow.style.left = Math.random() * 100 + "vw";
    snow.style.fontSize = (10 + Math.random() * 20) + "px";
    snow.style.animationDuration = (4 + Math.random() * 6) + "s";
    document.body.appendChild(snow);

    setTimeout(() => {
        snow.remove();
    }, 10000);
}

setInterval(createSnow, 120);

document.getElementById("startScreen").addEventListener("click", () => {
    music.play();
    document.getElementById("startScreen").style.display = "none";
    requestAnimationFrame(updateLyrics);
}, {once: true});

</script>



</body>

</html>
