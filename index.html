<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>For You</title>

<style>

body{
    margin:0;
    background:black;
    overflow:hidden;
    color:white;
    font-family:Georgia, serif;
}


#startScreen{

    position:fixed;
    inset:0;
    background:black;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    z-index:1000;
    cursor:pointer;

}


#startScreen h1{
    font-size:3em;
}


#startScreen p{
    opacity:0.8;
}




#lyrics{

    position:absolute;
    top:50%;
    width:100%;

    text-align:center;

    transform:translateY(-50%);

    font-size:2em;

    padding:20px;

    box-sizing:border-box;

}




.snowflake{

    position:absolute;
    color:white;

    animation:fall linear infinite;

}



@keyframes fall{

from{
    transform:translateY(-10vh);
}

to{
    transform:translateY(110vh);
}

}






#ending{

    position:fixed;

    inset:0;

    background:black;

    display:none;

    flex-direction:column;

    justify-content:center;

    align-items:center;

    text-align:center;

    padding:20px;

}





#photoGallery{

    display:flex;

    justify-content:center;

    flex-wrap:wrap;

    gap:15px;

    margin-bottom:25px;

}



#photoGallery img{

    width:180px;

    height:180px;

    object-fit:cover;

    border-radius:20px;

    animation:fade 2s;

}




#endingText{

    font-size:1.8em;

    animation:fade 2s;

}




@keyframes fade{

from{
    opacity:0;
}

to{
    opacity:1;
}

}



</style>

</head>



<body>



<div id="startScreen">

<h1>❤️ Im Sorry Naziff</h1>

<p>Click Anywhere</p>

</div>






<!-- MUSIC -->

<video id="bgMusic" style="display:none;" playsinline>

<source src="music.mp4" type="video/mp4">

</video>







<div id="lyrics"></div>







<div id="ending">


<div id="photoGallery">


<img src="photo1.jpg">

<img src="photo2.jpg">

<img src="photo3.jpg">


</div>



<div id="endingText">

i love u, please give me another chance ❤️

</div>


</div>







<script>



const lyrics=[


["So, what if I call",4200],


["And you pick up the phone?",3200],


["And I use this holiday to make my way to your ghost",6800],


["Oh, what if you're lonely",3000],


["And you know I am too",3000],


["And I get the chance to stay",3800],


["im sorry naziff, I miss you.",5000]


];






let box=document.getElementById("lyrics");








async function showLyrics(){



// small sync adjustment

await new Promise(resolve=>setTimeout(resolve,500));



for(let item of lyrics){



box.innerHTML=item[0];



await new Promise(resolve=>

setTimeout(resolve,item[1])

);



}



box.innerHTML="";



document.getElementById("ending")

.style.display="flex";


}









function createSnow(){



let snow=document.createElement("div");



snow.className="snowflake";



snow.innerHTML="❅";



snow.style.left=

Math.random()*100+"vw";



snow.style.fontSize=

(10+Math.random()*20)+"px";



snow.style.animationDuration=

(4+Math.random()*6)+"s";



document.body.appendChild(snow);




setTimeout(()=>{

snow.remove();

},10000);



}





setInterval(createSnow,120);









document.getElementById("startScreen")

.addEventListener("click",()=>{





let music=document.getElementById("bgMusic");



music.currentTime=0;



music.play();





document.getElementById("startScreen")

.style.display="none";





showLyrics();





},{once:true});







</script>



</body>

</html>
