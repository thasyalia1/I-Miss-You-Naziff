<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>For You</title>


<style>


body{

margin:0;
background:black;
overflow:hidden;
color:white;
font-family:Georgia,serif;

}



/* START */

#startScreen{

position:fixed;
inset:0;

background:black;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

z-index:1000;

cursor:pointer;

}


#startScreen h1{

font-size:3em;

}





/* LYRICS */


#lyrics{

position:absolute;

top:50%;

width:100%;

text-align:center;

transform:translateY(-50%);

font-size:2em;

}





/* SNOW */


.snowflake{

position:absolute;
color:white;

animation:fall linear infinite;

}



@keyframes fall{


from{

transform:translateY(-10vh);

}


to{

transform:translateY(110vh);

}


}







/* ENDING */


#ending{

position:fixed;

inset:0;

background:black;

display:none;

justify-content:center;

align-items:center;

z-index:10;


}







/* ENVELOPE */


#letter{


position:relative;


width:300px;

height:200px;


background:#fffaf0;


border-radius:8px;


box-shadow:0 0 40px white;


transform:scale(0);


}



/* flap */


#letter::before{


content:"";


position:absolute;


top:0;

left:0;


width:0;

height:0;


border-left:150px solid transparent;

border-right:150px solid transparent;


border-top:100px solid #e7d5ae;



transform-origin:top;


transition:1s;


z-index:5;


}







/* PAPER */


#paper{


position:absolute;


left:25px;


bottom:20px;


width:250px;


height:170px;


background:white;


color:#222;


padding:25px;


box-sizing:border-box;


border-radius:5px;


transform:translateY(80px);


opacity:0;


transition:1.5s;


z-index:2;


box-shadow:0 5px 20px rgba(0,0,0,.3);


}







#letter.open{


animation:openLetter 1s forwards;


}



#letter.open::before{


transform:rotateX(180deg);


z-index:1;


}




#letter.open #paper{


transform:translateY(-140px);


opacity:1;


}







#letterText{


font-size:1.2em;


line-height:1.6;


text-align:center;


white-space:pre-line;


}






@keyframes openLetter{


0%{

transform:scale(0);

}



100%{

transform:scale(1);

}


}







</style>


</head>




<body>





<div id="startScreen">


<h1>❤️ Im Sorry Naziff</h1>


<p>Click Anywhere</p>


</div>







<audio id="bgMusic" loop>


<source src="music.mp4" type="audio/mp4">


</audio>







<div id="lyrics"></div>








<div id="ending">


<div id="letter">



<div id="paper">


<div id="letterText"></div>



</div>



</div>


</div>







<script>





const lyrics=[



["So, what if I call",4200],


["And you pick up the phone?",4300],


["And I use this holiday to make my way to your ghost",7800],


["Oh, what if you're lonely",4000],


["And you know I am too",3300],


["And I get the chance to stay",3800],


["im sorry naziff, I miss you.",5000]


];








let box=document.getElementById("lyrics");








async function showLyrics(){



for(let item of lyrics){



box.innerHTML=item[0];



await new Promise(resolve=>


setTimeout(resolve,item[1])


);



}





box.innerHTML="";


showLetter();


}









function showLetter(){



document.getElementById("ending")

.style.display="flex";




let letter=document.getElementById("letter");





setTimeout(()=>{


letter.classList.add("open");



},300);







let text=


"No matter what happens,\n\nI am grateful I met you. ❤️";






let target=document.getElementById("letterText");



let i=0;







setTimeout(()=>{



let timer=setInterval(()=>{


target.innerHTML += text[i];



i++;




if(i>=text.length){


clearInterval(timer);


}



},80);




},1800);





}










function createSnow(){



let snow=document.createElement("div");



snow.className="snowflake";



snow.innerHTML="❅";



snow.style.left=

Math.random()*100+"vw";




snow.style.fontSize=

(10+Math.random()*20)+"px";




snow.style.animationDuration=

(4+Math.random()*6)+"s";







document.body.appendChild(snow);






setTimeout(()=>{


snow.remove();



},10000);




}







setInterval(createSnow,120);









document.getElementById("startScreen")

.addEventListener("click",()=>{






let music=document.getElementById("bgMusic");



music.currentTime=0;



music.play();







document.getElementById("startScreen")

.style.display="none";





showLyrics();





},{once:true});






</script>






</body>


</html>
