<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Im sorry Naziff ❤️</title>

<style>

body{
    margin:0;
    background:black;
    overflow:hidden;
    color:white;
    font-family:Georgia,serif;
}

/* START */

#startScreen{
    position:fixed;
    inset:0;
    background:black;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:1000;
    cursor:pointer;
    text-align:center;
}

#startScreen h1{
    font-size:3em;
    margin-bottom:10px;
}

#startScreen p{
    opacity:.8;
}

/* LYRICS */

#lyrics{
    position:absolute;
    top:50%;
    width:100%;
    transform:translateY(-50%);
    text-align:center;
    font-size:2em;
    padding:20px;
    box-sizing:border-box;
}

/* SNOW */

.snowflake{
    position:absolute;
    color:white;
    animation:fall linear infinite;
}

@keyframes fall{
    from{
        transform:translateY(-10vh);
    }
    to{
        transform:translateY(110vh);
    }
}

/* ENDING */

#ending{
    position:fixed;
    inset:0;
    background:black;
    display:none;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:20;
}

/* PHOTOS */

#photoGallery{
    display:flex;
    gap:20px;
    margin-bottom:40px;
    opacity:0;
    transition:2s;
}

#photoGallery.show{
    opacity:1;
}

#photoGallery img{
    width:180px;
    height:180px;
    object-fit:cover;
    border-radius:15px;
    box-shadow:0 0 20px rgba(255,255,255,.2);
}

/* ENVELOPE */

#envelope{
    width:350px;
    height:220px;
    background:#d9b382;
    border-radius:8px;
    position:relative;
    overflow:visible;
}

#paper{
    position:absolute;
    left:25px;
    width:300px;
    min-height:220px;
    background:white;
    color:black;
    padding:25px;
    box-sizing:border-box;
    transform:translateY(170px);
    transition:2s ease;
    box-shadow:0 0 25px rgba(0,0,0,.3);
}

#paper.open{
    transform:translateY(-130px);
}

#letterText{
    text-align:center;
    line-height:1.8;
    font-size:1.2em;
    white-space:pre-line;
}

/* FIREWORK */

#fireworks{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:25;
}

</style>
</head>

<body>

<div id="startScreen">

<h1>❤️ Im Sorry Naziff</h1>

<p>
Click Anywhere
</p>

</div>

<audio id="bgMusic" loop>
<source src="music.mp4" type="audio/mp4">
</audio>

<div id="lyrics"></div>

<div id="ending">

    <div id="photoGallery">

        <img src="photo1.jpg">
        <img src="photo2.jpg">
        <img src="photo3.jpg">

    </div>

    <div id="envelope">

        <div id="paper">

            <div id="letterText"></div>

        </div>

    </div>

</div>

<canvas id="fireworks"></canvas>

<script>

/* LYRICS */

const lyrics = [

["So, what if I call",4200],

["And you pick up the phone?",4300],

["And I use this holiday to make my way to your ghost",7800],

["Or what if you're lonely",4500],

["And you know I am too",3400],

["And I get the chance to say",5000],

["im sorry naziff, I miss you.",5000]

];

let box =
document.getElementById("lyrics");

/* LYRIC SHOW */

async function showLyrics(){

    await new Promise(r=>setTimeout(r,500));

    for(let item of lyrics){

        box.innerHTML=item[0];

        await new Promise(r=>
        setTimeout(r,item[1]));

    }

    box.innerHTML="";

    showEnding();
}

/* ENDING */

function showEnding(){

    document.getElementById("ending")
    .style.display="flex";

    startFireworks();

    setTimeout(()=>{

        document
        .getElementById("photoGallery")
        .classList.add("show");

    },500);

    setTimeout(()=>{

        document
        .getElementById("paper")
        .classList.add("open");

    },2500);

    setTimeout(()=>{

        typeLetter();

    },4500);

}

/* LETTER */

function typeLetter(){

    const text =

`No matter what happens,
I am grateful I met you.
Thank you for every memory.
❤️`;

    let target =
    document.getElementById("letterText");

    let i=0;

    let timer=setInterval(()=>{

        target.innerHTML +=
        text.charAt(i);

        i++;

        if(i>=text.length){

            clearInterval(timer);

        }

    },70);

}

/* SNOW */

function createSnow(){

    let snow=
    document.createElement("div");

    snow.className=
    "snowflake";

    snow.innerHTML="❅";

    snow.style.left=
    Math.random()*100+"vw";

    snow.style.fontSize=
    (10+Math.random()*20)+"px";

    snow.style.animationDuration=
    (4+Math.random()*6)+"s";

    document.body.appendChild(snow);

    setTimeout(()=>{

        snow.remove();

    },10000);

}

setInterval(createSnow,120);

/* FIREWORK */

const canvas =
document.getElementById("fireworks");

const ctx =
canvas.getContext("2d");

canvas.width =
window.innerWidth;

canvas.height =
window.innerHeight;

let particles=[];

function heartFirework(){

    let x=
    Math.random()*canvas.width;

    let y=
    Math.random()*canvas.height/2;

    for(let i=0;i<80;i++){

        let angle=
        Math.PI*2*i/80;

        let hx=
        16*Math.pow(Math.sin(angle),3);

        let hy=-(

        13*Math.cos(angle)

        -5*Math.cos(2*angle)

        -2*Math.cos(3*angle)

        -Math.cos(4*angle)

        );

        particles.push({

            x:x,
            y:y,

            vx:hx/8,
            vy:hy/8,

            life:100

        });

    }

}

function animateFirework(){

    ctx.clearRect(
    0,0,
    canvas.width,
    canvas.height
    );

    particles.forEach((p,index)=>{

        p.x+=p.vx;
        p.y+=p.vy;

        p.life--;

        ctx.font="20px serif";
        ctx.fillText("❤️",p.x,p.y);

        if(p.life<=0){

            particles.splice(index,1);

        }

    });

    requestAnimationFrame(
    animateFirework
    );

}

animateFirework();

function startFireworks(){

    setInterval(()=>{

        heartFirework();

    },1500);

}

/* START */

document
.getElementById("startScreen")
.addEventListener("click",()=>{

    let music=
    document.getElementById("bgMusic");

    music.currentTime=0;

    music.play();

    document
    .getElementById("startScreen")
    .style.display="none";

    showLyrics();

},{once:true});

</script>

</body>
</html>
