<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Im Sorry Naziff ❤️</title>

<style>

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
}

html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    position: fixed;
    top: 0;
    left: 0;
    background: black;
    color: white;
    font-family: Georgia, serif;
    -webkit-user-select: none;
    user-select: none;
    -webkit-text-size-adjust: 100%;
}

#startScreen {
    position: fixed;
    inset: 0;
    background: black;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 1000;
    cursor: pointer;
    touch-action: manipulation;
    -webkit-touch-callout: none;
}

#startScreen h1 {
    font-size: clamp(2em, 6vw, 4em);
    text-shadow: 0 0 30px rgba(255,50,100,0.5);
    animation: glow 2s ease-in-out infinite alternate;
    text-align: center;
    padding: 0 20px;
    pointer-events: none;
}

@keyframes glow {
    from { text-shadow: 0 0 20px rgba(255,50,100,0.3); }
    to { text-shadow: 0 0 40px rgba(255,50,100,0.8); }
}

#startScreen p {
    margin-top: 20px;
    animation: pulse 2s infinite;
    font-size: clamp(1em, 2.5vw, 1.5em);
    color: #ff6f9c;
    pointer-events: none;
    padding: 10px 30px;
    background: rgba(255,100,150,0.1);
    border-radius: 30px;
    border: 1px solid rgba(255,100,150,0.2);
}

@keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.3; transform: scale(0.95); }
}

#lyrics {
    position: absolute;
    top: 50%;
    width: 100%;
    transform: translateY(-50%);
    text-align: center;
    font-size: clamp(1.2em, 3.5vw, 2.5em);
    z-index: 10;
    text-shadow: 0 0 20px rgba(255,100,150,0.5);
    padding: 0 20px;
    pointer-events: none;
    line-height: 1.6;
}

.snowflake {
    position: absolute;
    color: white;
    animation: fall linear infinite;
    pointer-events: none;
    will-change: transform;
}

@keyframes fall {
    from { transform: translateY(-10vh) rotate(0deg); }
    to { transform: translateY(110vh) rotate(360deg); }
}

#ending {
    position: fixed;
    inset: 0;
    background: black;
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 20;
    padding: 20px;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
}

#photoGallery {
    display: flex;
    gap: clamp(10px, 3vw, 30px);
    margin-bottom: clamp(20px, 5vh, 50px);
    opacity: 0;
    transition: 2s;
    flex-wrap: wrap;
    justify-content: center;
}

#photoGallery.show {
    opacity: 1;
}

#photoGallery img {
    width: clamp(100px, 20vw, 180px);
    height: clamp(100px, 20vw, 180px);
    object-fit: cover;
    border-radius: 15px;
    border: 2px solid rgba(255,100,150,0.3);
    box-shadow: 0 0 30px rgba(255,100,150,0.1);
    transition: transform 0.3s;
    pointer-events: none;
    -webkit-user-drag: none;
}

#envelope {
    position: relative;
    width: clamp(280px, 40vw, 400px);
    height: clamp(180px, 25vw, 250px);
    background: #ff9fbc;
    border-radius: 15px;
    overflow: visible;
    box-shadow: 0 10px 40px rgba(255,100,150,0.2);
}

#flap {
    position: absolute;
    top: 0;
    left: 0;
    border-left: clamp(140px, 20vw, 200px) solid transparent;
    border-right: clamp(140px, 20vw, 200px) solid transparent;
    border-top: clamp(100px, 14vw, 150px) solid #ff6f9c;
    z-index: 5;
    transition: all 0.5s;
}

#paper {
    position: absolute;
    left: clamp(10px, 1.5vw, 20px);
    bottom: clamp(15px, 2vw, 25px);
    width: calc(100% - clamp(20px, 3vw, 40px));
    min-height: clamp(180px, 25vw, 280px);
    background: white;
    color: black;
    padding: clamp(15px, 2.5vw, 30px);
    border-radius: 12px;
    transform: translateY(80px);
    opacity: 0;
    transition: 2s ease;
    z-index: 10;
    box-shadow: 0 5px 30px rgba(0,0,0,0.3);
}

#paper.open {
    transform: translateY(clamp(-120px, -18vw, -200px));
    opacity: 1;
}

#letterText {
    text-align: center;
    line-height: 1.8;
    white-space: pre-line;
    font-size: clamp(12px, 1.5vw, 16px);
}

#seal {
    position: absolute;
    top: clamp(70px, 10vw, 100px);
    left: 50%;
    transform: translateX(-50%);
    width: clamp(40px, 5vw, 60px);
    height: clamp(40px, 5vw, 60px);
    background: #ff3366;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 20;
    font-size: clamp(18px, 2.5vw, 28px);
    box-shadow: 0 0 30px rgba(255,51,102,0.5);
    animation: sealPulse 2s infinite;
    pointer-events: none;
}

@keyframes sealPulse {
    0%, 100% { transform: translateX(-50%) scale(1); }
    50% { transform: translateX(-50%) scale(1.1); }
}

#fireworks {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 30;
}

#neonHeart {
    position: fixed;
    inset: 0;
    background: black;
    display: none;
    z-index: 100;
}

#heartCanvas {
    width: 100%;
    height: 100%;
    display: block;
}

/* iPad dan tablet fixes */
@media (max-width: 1024px) and (orientation: portrait) {
    #lyrics { font-size: 1.8em; }
    #photoGallery img { width: 150px; height: 150px; }
}

@media (max-width: 768px) {
    #lyrics { font-size: 1.2em; }
    #photoGallery img { width: 120px; height: 120px; }
}

@media (max-width: 480px) {
    #lyrics { font-size: 1em; }
    #photoGallery img { width: 100px; height: 100px; }
    #envelope { width: 260px; height: 170px; }
}

</style>

</head>

<body>

<div id="startScreen">
    <h1>❤️ Im Sorry Naziff</h1>
    <p>👆 Tap to Start</p>
</div>

<audio id="bgMusic" loop preload="auto" playsinline webkit-playsinline>
    <source src="music.m4a" type="audio/mp4">
    <source src="music.mp3" type="audio/mpeg">
    <source src="music.mp4" type="audio/mp4">
</audio>

<div id="lyrics"></div>

<div id="ending">
    <div id="photoGallery">
        <img src="photo1.jpg" alt="Memory 1" draggable="false">
        <img src="photo2.jpg" alt="Memory 2" draggable="false">
        <img src="photo3.jpg" alt="Memory 3" draggable="false">
    </div>

    <div id="envelope">
        <div id="paper">
            <div id="letterText"></div>
        </div>
        <div id="flap"></div>
        <div id="seal">❤️</div>
    </div>
</div>

<canvas id="fireworks"></canvas>

<div id="neonHeart">
    <canvas id="heartCanvas"></canvas>
</div>

<script>
// ============================================
// UNIVERSAL COMPATIBILITY FIXES
// ============================================

// Fix untuk semua iOS devices
document.addEventListener('DOMContentLoaded', function() {
    // Ensure body takes full height
    document.body.style.height = window.innerHeight + 'px';
    
    // Fix untuk iOS Safari bounce effect
    document.body.addEventListener('touchmove', function(e) {
        if (e.target === document.body) {
            e.preventDefault();
        }
    }, { passive: false });
});

// Handle orientation changes
window.addEventListener('orientationchange', function() {
    setTimeout(function() {
        document.body.style.height = window.innerHeight + 'px';
        if (canvas) {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        if (hCanvas) {
            hCanvas.width = window.innerWidth;
            hCanvas.height = window.innerHeight;
        }
    }, 300);
});

// ============================================
// LYRICS DATA
// ============================================

const lyrics = [
    {text: "So, what if I call", time: 0},
    {text: "And you pick up the phone?", time: 4.2},
    {text: "And I use this holiday to make my way to your ghost", time: 8.5},
    {text: "Or what if you're lonely", time: 16},
    {text: "And you know I am too", time: 21},
    {text: "And I get the chance to say", time: 25},
    {text: "im sorry naziff, I miss you ❤️", time: 31}
];

// ============================================
// GLOBAL VARIABLES
// ============================================

let box = document.getElementById("lyrics");
let current = -1;
let lastTime = 0;
let endingShown = false;
let letterStarted = false;
let syncId = null;
let snowInterval = null;
let musicStarted = false;
let fireworksInterval = null;

// ============================================
// MAIN FUNCTIONS
// ============================================

function showLyrics() {
    let music = document.getElementById("bgMusic");
    
    function sync() {
        let now = music.currentTime;
        
        for (let i = 0; i < lyrics.length; i++) {
            if (now >= lyrics[i].time && now < (lyrics[i+1]?.time || 999)) {
                if (current !== i) {
                    box.innerHTML = lyrics[i].text;
                    current = i;
                    if (i === lyrics.length - 1) {
                        lastTime = now;
                    }
                }
            }
        }
        
        if (current === lyrics.length - 1 && now >= lastTime + 10 && !endingShown) {
            box.innerHTML = "";
            showEnding();
        }
        
        syncId = requestAnimationFrame(sync);
    }
    
    sync();
}

function showEnding() {
    if (endingShown) return;
    endingShown = true;
    
    document.getElementById("ending").style.display = "flex";
    startFireworks();
    
    setTimeout(() => {
        document.getElementById("photoGallery").classList.add("show");
    }, 500);
    
    setTimeout(() => {
        document.getElementById("paper").classList.add("open");
    }, 8500);
    
    setTimeout(() => {
        typeLetter();
    }, 11000);
}

function typeLetter() {
    if (letterStarted) return;
    letterStarted = true;
    
    const text = `I'm sorry Naziff ❤️\nThank you for every memory, sayang.\nPlease give me another chance.\nI hope we can be okay again ❤️`;
    let target = document.getElementById("letterText");
    let i = 0;
    
    let timer = setInterval(() => {
        target.innerHTML += text.charAt(i);
        i++;
        if (i >= text.length) {
            clearInterval(timer);
            setTimeout(() => {
                startNeonHeart();
            }, 8000);
        }
    }, 60);
}

// ============================================
// SNOW EFFECT
// ============================================

function createSnow() {
    let snow = document.createElement("div");
    snow.className = "snowflake";
    snow.innerHTML = "❅";
    snow.style.left = Math.random() * 100 + "vw";
    snow.style.fontSize = (10 + Math.random() * 20) + "px";
    snow.style.animationDuration = (4 + Math.random() * 6) + "s";
    snow.style.opacity = 0.3 + Math.random() * 0.7;
    
    document.body.appendChild(snow);
    
    setTimeout(() => {
        snow.remove();
    }, 10000);
}

snowInterval = setInterval(createSnow, 120);

// ============================================
// FIREWORKS
// ============================================

const canvas = document.getElementById("fireworks");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

function heartFirework() {
    let x = Math.random() * canvas.width;
    let y = Math.random() * canvas.height / 2;
    
    for (let i = 0; i < 80; i++) {
        let angle = Math.PI * 2 * i / 80;
        let hx = 16 * Math.pow(Math.sin(angle), 3);
        let hy = -(13 * Math.cos(angle) - 5 * Math.cos(2 * angle) - 2 * Math.cos(3 * angle) - Math.cos(4 * angle));
        
        particles.push({
            x: x,
            y: y,
            vx: hx / 8,
            vy: hy / 8,
            life: 100
        });
    }
}

function animateFirework() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    particles.forEach((p, index) => {
        p.x += p.vx;
        p.y += p.vy;
        p.life--;
        
        ctx.font = "20px serif";
        ctx.textAlign = "center";
        ctx.fillText("❤️", p.x, p.y);
        
        if (p.life <= 0) {
            particles.splice(index, 1);
        }
    });
    
    requestAnimationFrame(animateFirework);
}

animateFirework();

function startFireworks() {
    if (fireworksInterval) clearInterval(fireworksInterval);
    fireworksInterval = setInterval(() => {
        heartFirework();
    }, 1500);
}

// ============================================
// NEON HEART
// ============================================

const hCanvas = document.getElementById("heartCanvas");
const hctx = hCanvas.getContext("2d");

function resizeHeart() {
    hCanvas.width = window.innerWidth;
    hCanvas.height = window.innerHeight;
}

resizeHeart();

window.addEventListener("resize", resizeHeart);

let points = [];
let ttt = 0;

function makeHeart() {
    points = [];
    for (let i = 0; i < 160; i++) {
        let t = Math.PI * 2 * i / 160;
        let x = 16 * Math.pow(Math.sin(t), 3);
        let y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
        
        points.push({
            x: x * 18,
            y: y * 18,
            phase: Math.random() * 10
        });
    }
}

function neonDraw() {
    hctx.clearRect(0, 0, hCanvas.width, hCanvas.height);
    ttt += 0.03;
    
    let cx = hCanvas.width / 2;
    let cy = hCanvas.height / 2;
    
    points.forEach(p => {
        let pulse = Math.sin(ttt + p.phase) * 5;
        
        hctx.save();
        hctx.translate(cx + p.x + pulse, cy + p.y + pulse);
        hctx.font = "bold 22px Arial";
        hctx.textAlign = "center";
        hctx.shadowColor = "#ff4fa3";
        hctx.shadowBlur = 35;
        hctx.fillStyle = "#ff7ed0";
        hctx.fillText("I love u Naziff", 0, 0);
        hctx.restore();
    });
    
    requestAnimationFrame(neonDraw);
}

function startNeonHeart() {
    document.getElementById("neonHeart").style.display = "block";
    makeHeart();
    neonDraw();
}

// ============================================
// START APP - UNIVERSAL COMPATIBILITY
// ============================================

function startApp(e) {
    if (e) e.preventDefault();
    if (musicStarted) return;
    musicStarted = true;
    
    let music = document.getElementById("bgMusic");
    
    // Try to play audio
    let playPromise = music.play();
    if (playPromise !== undefined) {
        playPromise.then(() => {
            console.log("Audio playing");
        }).catch((err) => {
            console.log("Audio play failed:", err);
            // Try one more time on user interaction
            document.addEventListener('touchstart', function retry() {
                music.play().catch(() => {});
                document.removeEventListener('touchstart', retry);
            }, {once: true});
        });
    }
    
    document.getElementById("startScreen").style.display = "none";
    showLyrics();
}

// EVENT LISTENERS FOR ALL PLATFORMS

// Click for Mac/Desktop
document.getElementById("startScreen").addEventListener("click", startApp, {once: true});

// Touch for iPhone/iPad
document.getElementById("startScreen").addEventListener("touchstart", function(e) {
    e.preventDefault();
    startApp(e);
}, {once: true, passive: false});

// Fallback for any other touch
document.addEventListener('touchstart', function firstTouch(e) {
    if (!musicStarted && document.getElementById("startScreen").style.display !== "none") {
        startApp(e);
    }
    document.removeEventListener('touchstart', firstTouch);
}, {once: true, passive: false});

// Keyboard support (Space/Enter untuk Mac)
document.addEventListener('keydown', function(e) {
    if ((e.key === ' ' || e.key === 'Enter') && !musicStarted) {
        e.preventDefault();
        startApp(e);
    }
}, {once: true});

// ============================================
// WINDOW RESIZE HANDLER
// ============================================

window.addEventListener('resize', function() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    resizeHeart();
    document.body.style.height = window.innerHeight + 'px';
});

// ============================================
// CLEANUP
// ============================================

window.addEventListener('beforeunload', function() {
    if (syncId) cancelAnimationFrame(syncId);
    if (snowInterval) clearInterval(snowInterval);
    if (fireworksInterval) clearInterval(fireworksInterval);
});

console.log("❤️ Page loaded - Compatible with iPhone, iPad, and Mac ❤️");
</script>

</body>
</html>
